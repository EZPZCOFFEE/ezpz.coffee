  <text x="72" y="333" font-family="Georgia, serif" font-size="12" fill="rgba(255,255,255,0.38)" letter-spacing="0.2">Canada · 2026</text>

  <!-- EZPZ badge -->
  <rect x="72" y="362" width="108" height="26" rx="3" fill="rgba(196,62,20,0.14)" stroke="rgba(196,62,20,0.38)" stroke-width="1"/>
  <text x="126" y="380" font-family="Georgia, serif" font-size="10" font-weight="700" fill="rgba(196,62,20,0.88)" text-anchor="middle" letter-spacing="1">BY EZPZ COFFEE</text>

