<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" width="800" height="420">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0e1520"/>
      <stop offset="100%" style="stop-color:#1a2535"/>
    </linearGradient>
    <linearGradient id="bagGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2a3545"/>
      <stop offset="100%" style="stop-color:#1a2535"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#c43e14"/>
      <stop offset="100%" style="stop-color:#e8521a"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="420" fill="url(#bg)"/>

  <!-- Subtle grid lines -->
  <line x1="0" y1="140" x2="800" y2="140" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="0" y1="280" x2="800" y2="280" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="200" y1="0" x2="200" y2="420" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="400" y1="0" x2="400" y2="420" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="600" y1="0" x2="600" y2="420" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>

  <!-- Coffee bag body -->
  <rect x="280" y="60" width="150" height="230" rx="7" fill="url(#bagGrad)" stroke="rgba(255,255,255,0.12)" stroke-width="1.5"/>
  <!-- Top seal -->
  <rect x="288" y="60" width="134" height="26" rx="4" fill="rgba(0,0,0,0.25)"/>
  <line x1="288" y1="73" x2="422" y2="73" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <rect x="346" y="60" width="5" height="14" rx="1" fill="rgba(255,255,255,0.1)"/>
  <rect x="359" y="60" width="5" height="14" rx="1" fill="rgba(255,255,255,0.1)"/>
  <!-- Bottom gusset -->
  <rect x="288" y="265" width="134" height="25" rx="4" fill="rgba(0,0,0,0.2)"/>
  <!-- Side seams -->
  <rect x="280" y="86" width="10" height="179" fill="rgba(0,0,0,0.2)"/>
  <rect x="420" y="86" width="10" height="179" fill="rgba(0,0,0,0.2)"/>

  <!-- Label panel on bag -->
  <rect x="298" y="102" width="114" height="140" rx="3" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
  <text x="355" y="148" font-family="Arial, sans-serif" font-size="11" font-weight="700" fill="rgba(255,255,255,0.85)" text-anchor="middle" letter-spacing="3">YOUR</text>
  <text x="355" y="168" font-family="Arial, sans-serif" font-size="11" font-weight="700" fill="rgba(255,255,255,0.85)" text-anchor="middle" letter-spacing="3">BRAND</text>
  <line x1="318" y1="180" x2="392" y2="180" stroke="rgba(255,255,255,0.2)" stroke-width="0.75"/>
  <text x="355" y="198" font-family="Georgia, serif" font-size="8.5" fill="rgba(255,255,255,0.45)" text-anchor="middle" font-style="italic">Specialty Coffee</text>
  <text x="355" y="214" font-family="Arial, sans-serif" font-size="7" fill="rgba(255,255,255,0.3)" text-anchor="middle" letter-spacing="1.5">CANADA</text>
  <!-- Valve -->
  <circle cx="355" cy="237" r="5.5" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
  <circle cx="355" cy="237" r="2" fill="rgba(255,255,255,0.1)"/>

  <!-- Left side: house / property illustration -->
  <!-- House body -->
  <rect x="112" y="195" width="90" height="65" rx="2" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.15)" stroke-width="1.5"/>
  <!-- Roof -->
  <polygon points="100,195 157,145 214,195" fill="rgba(232,82,26,0.2)" stroke="rgba(232,82,26,0.5)" stroke-width="1.5"/>
  <!-- Door -->
  <rect x="145" y="225" width="24" height="35" rx="2" fill="rgba(255,255,255,0.1)" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
  <circle cx="165" cy="244" r="2" fill="rgba(255,255,255,0.4)"/>
  <!-- Windows -->
  <rect x="118" y="205" width="22" height="20" rx="1" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
  <line x1="129" y1="205" x2="129" y2="225" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <line x1="118" y1="215" x2="140" y2="215" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <rect x="174" y="205" width="22" height="20" rx="1" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
  <line x1="185" y1="205" x2="185" y2="225" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <line x1="174" y1="215" x2="196" y2="215" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <!-- Key icon above house -->
  <circle cx="157" cy="126" r="10" fill="none" stroke="rgba(232,82,26,0.6)" stroke-width="1.5"/>
  <rect x="163" y="122" width="18" height="6" rx="1" fill="none" stroke="rgba(232,82,26,0.6)" stroke-width="1.5"/>
  <rect x="176" y="128" width="4" height="4" rx="0.5" fill="rgba(232,82,26,0.5)"/>
  <rect x="170" y="128" width="4" height="6" rx="0.5" fill="rgba(232,82,26,0.5)"/>

  <!-- Right side: 5-star review panel -->
  <rect x="470" y="130" width="190" height="160" rx="4" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <!-- Panel header -->
  <rect x="470" y="130" width="190" height="28" rx="4" fill="rgba(232,82,26,0.15)"/>
  <rect x="470" y="146" width="190" height="12" fill="rgba(232,82,26,0.15)"/>
  <text x="565" y="149" font-family="Arial, sans-serif" font-size="7.5" font-weight="700" fill="#e8521a" text-anchor="middle" letter-spacing="2">GUEST EXPERIENCE</text>

  <!-- Stars -->
  <text x="490" y="182" font-family="Arial, sans-serif" font-size="16" fill="rgba(232,82,26,0.85)">★★★★★</text>
  <text x="490" y="200" font-family="Arial, sans-serif" font-size="7" fill="rgba(255,255,255,0.35)" letter-spacing="1">5-STAR REVIEW RATE</text>

  <!-- Review quote lines -->
  <line x1="484" y1="216" x2="646" y2="216" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  <rect x="484" y="222" width="145" height="4" rx="2" fill="rgba(255,255,255,0.1)"/>
  <rect x="484" y="232" width="120" height="4" rx="2" fill="rgba(255,255,255,0.07)"/>
  <rect x="484" y="242" width="135" height="4" rx="2" fill="rgba(255,255,255,0.07)"/>

  <line x1="484" y1="258" x2="646" y2="258" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  <rect x="484" y="264" width="145" height="4" rx="2" fill="rgba(255,255,255,0.1)"/>
  <rect x="484" y="274" width="100" height="4" rx="2" fill="rgba(255,255,255,0.07)"/>

  <!-- Footer label -->
  <text x="400" y="398" font-family="Arial, sans-serif" font-size="8.5" fill="rgba(255,255,255,0.2)" text-anchor="middle" letter-spacing="3">AIRBNB HOSTING · CUSTOM BRANDED COFFEE · CANADA</text>
</svg>
