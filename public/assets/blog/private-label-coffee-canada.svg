  <text x="104" y="51" font-family="Arial, sans-serif" font-size="7.5" font-weight="800" fill="#ff4200" text-anchor="middle" letter-spacing="2">COMPLETE GUIDE</text>

  <!-- Main title -->
  <text x="40" y="98" font-family="Arial, sans-serif" font-size="26" font-weight="800" fill="#ffffff" letter-spacing="-0.02em">Private Label</text>
  <text x="40" y="130" font-family="Arial, sans-serif" font-size="26" font-weight="800" fill="#ff4200" letter-spacing="-0.02em">Coffee Canada</text>
  <text x="40" y="153" font-family="Arial, sans-serif" font-size="11" font-weight="600" fill="rgba(255,255,255,0.38)" letter-spacing="0.12em">THE 2026 GUIDE</text>

  <!-- Stat pills row -->
  <rect x="40" y="174" width="86" height="30" rx="4" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <text x="83" y="185" font-family="Arial, sans-serif" font-size="11" font-weight="800" fill="#ff4200" text-anchor="middle">ZERO</text>
  <text x="83" y="197" font-family="Arial, sans-serif" font-size="6.5" fill="rgba(255,255,255,0.38)" text-anchor="middle" letter-spacing="1">MIN ORDER</text>

  <rect x="136" y="174" width="86" height="30" rx="4" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <text x="179" y="185" font-family="Arial, sans-serif" font-size="11" font-weight="800" fill="#ff7744" text-anchor="middle">2–3 WKS</text>
  <text x="179" y="197" font-family="Arial, sans-serif" font-size="6.5" fill="rgba(255,255,255,0.38)" text-anchor="middle" letter-spacing="1">TURNAROUND</text>

  <rect x="232" y="174" width="86" height="30" rx="4" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <text x="275" y="185" font-family="Arial, sans-serif" font-size="10" font-weight="800" fill="#ff7744" text-anchor="middle">FULL SVC</text>
  <text x="275" y="197" font-family="Arial, sans-serif" font-size="6.5" fill="rgba(255,255,255,0.38)" text-anchor="middle" letter-spacing="1">INCLUDED</text>

  <!-- In this guide section -->
  <text x="40" y="232" font-family="Arial, sans-serif" font-size="6.5" fill="rgba(255,255,255,0.2)" letter-spacing="2.5">IN THIS GUIDE</text>
  <line x1="40" y1="237" x2="210" y2="237" stroke="rgba(255,255,255,0.07)" stroke-width="1"/>

  <text x="40" y="257" font-family="Arial, sans-serif" font-size="8" fill="rgba(255,255,255,0.42)">→  What is private label coffee?</text>
  <text x="40" y="273" font-family="Arial, sans-serif" font-size="8" fill="rgba(255,255,255,0.42)">→  How much does it cost in Canada?</text>
  <text x="40" y="289" font-family="Arial, sans-serif" font-size="8" fill="rgba(255,255,255,0.42)">→  Which coffee to choose for your brand</text>
  <text x="40" y="305" font-family="Arial, sans-serif" font-size="8" fill="rgba(255,255,255,0.42)">→  Pricing for maximum profit</text>
  <text x="40" y="321" font-family="Arial, sans-serif" font-size="8" fill="rgba(255,255,255,0.42)">→  5 common mistakes to avoid</text>
  <text x="40" y="337" font-family="Arial, sans-serif" font-size="8" fill="rgba(255,255,255,0.35)">→  Legal &amp; regulatory in Canada</text>

  <!-- Footer -->
  <text x="400" y="400" font-family="Arial, sans-serif" font-size="7.5" fill="rgba(255,255,255,0.15)" text-anchor="middle" letter-spacing="3">COMPLETE GUIDE · PRIVATE LABEL COFFEE CANADA · EZPZ COFFEE</text>
</svg>
