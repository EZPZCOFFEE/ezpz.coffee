<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" width="800" height="420">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0D0A07"/>
      <stop offset="100%" style="stop-color:#1a1208"/>
    </linearGradient>
    <linearGradient id="bagGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2a1f12"/>
      <stop offset="100%" style="stop-color:#1a1208"/>
    </linearGradient>
    <radialGradient id="glow" cx="72%" cy="50%" r="38%">
      <stop offset="0%" style="stop-color:rgba(255,66,0,0.22)"/>
      <stop offset="100%" style="stop-color:rgba(255,66,0,0)"/>
    </radialGradient>
  </defs>

  <rect width="800" height="420" fill="url(#bg)"/>

  <!-- Grid -->
  <line x1="0" y1="140" x2="800" y2="140" stroke="rgba(255,255,255,0.025)" stroke-width="1"/>
  <line x1="0" y1="280" x2="800" y2="280" stroke="rgba(255,255,255,0.025)" stroke-width="1"/>
  <line x1="400" y1="0" x2="400" y2="420" stroke="rgba(255,255,255,0.025)" stroke-width="1"/>

  <!-- Bag glow -->
  <ellipse cx="565" cy="210" rx="170" ry="155" fill="url(#glow)"/>

  <!-- Coffee bag -->
  <rect x="482" y="55" width="158" height="242" rx="8" fill="url(#bagGrad)" stroke="rgba(255,255,255,0.12)" stroke-width="1.5"/>
  <!-- Top seal -->
  <rect x="492" y="55" width="138" height="28" rx="5" fill="rgba(0,0,0,0.4)"/>
  <!-- Accent stripe -->
  <rect x="505" y="83" width="112" height="4" fill="#ff4200" opacity="0.9"/>
  <!-- Label -->
  <rect x="505" y="89" width="112" height="152" rx="2" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <!-- YOUR BRAND -->
  <text x="561" y="116" font-family="Arial, sans-serif" font-size="7.5" font-weight="700" fill="rgba(255,66,0,0.85)" text-anchor="middle" letter-spacing="2.5">YOUR BRAND</text>
  <line x1="521" y1="124" x2="601" y2="124" stroke="rgba(255,66,0,0.3)" stroke-width="0.75"/>
  <!-- COFFEE -->
  <text x="561" y="152" font-family="Arial, sans-serif" font-size="20" font-weight="800" fill="rgba(255,255,255,0.9)" text-anchor="middle" letter-spacing="2">COFFEE</text>
  <!-- Specialty badge -->
  <rect x="519" y="162" width="84" height="17" rx="2" fill="rgba(255,66,0,0.15)" stroke="rgba(255,66,0,0.3)" stroke-width="0.75"/>
  <text x="561" y="174" font-family="Arial, sans-serif" font-size="6.5" fill="rgba(255,66,0,0.8)" text-anchor="middle" letter-spacing="1">SPECIALTY 80+ SCA</text>
  <!-- Tasting notes -->
  <text x="561" y="200" font-family="Georgia, serif" font-size="7.5" fill="rgba(255,255,255,0.38)" text-anchor="middle" font-style="italic">Caramel · Red Apple · Hazelnut</text>
  <text x="561" y="215" font-family="Arial, sans-serif" font-size="6" fill="rgba(255,255,255,0.25)" text-anchor="middle" letter-spacing="1.5">ROASTED IN MONTREAL</text>
  <!-- Valve -->
  <circle cx="561" cy="234" r="6" fill="none" stroke="rgba(255,255,255,0.12)" stroke-width="1.5"/>
  <circle cx="561" cy="234" r="2.5" fill="rgba(255,255,255,0.07)"/>
  <!-- Bottom gusset -->
  <rect x="492" y="268" width="138" height="28" rx="4" fill="rgba(0,0,0,0.35)"/>

  <!-- LEFT TEXT BLOCK -->
  <!-- Complete Guide badge -->
