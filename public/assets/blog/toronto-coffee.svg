<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" width="800" height="420">
  <defs>
    <linearGradient id="tbg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0c1a18"/>
      <stop offset="100%" style="stop-color:#0f1f1c"/>
    </linearGradient>
    <linearGradient id="taccent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#c43e14"/>
      <stop offset="100%" style="stop-color:#e8521a"/>
    </linearGradient>
    <filter id="tglow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="420" fill="url(#tbg)"/>

  <!-- Subtle grid lines -->
  <line x1="0" y1="105" x2="800" y2="105" stroke="rgba(255,255,255,0.025)" stroke-width="1"/>
  <line x1="0" y1="210" x2="800" y2="210" stroke="rgba(255,255,255,0.025)" stroke-width="1"/>
  <line x1="0" y1="315" x2="800" y2="315" stroke="rgba(255,255,255,0.025)" stroke-width="1"/>
  <line x1="200" y1="0" x2="200" y2="420" stroke="rgba(255,255,255,0.025)" stroke-width="1"/>
  <line x1="400" y1="0" x2="400" y2="420" stroke="rgba(255,255,255,0.025)" stroke-width="1"/>
  <line x1="600" y1="0" x2="600" y2="420" stroke="rgba(255,255,255,0.025)" stroke-width="1"/>

  <!-- Toronto skyline silhouette (right side) -->
  <!-- CN Tower -->
  <rect x="580" y="120" width="6" height="200" fill="rgba(196,62,20,0.35)"/>
  <ellipse cx="583" cy="222" rx="18" ry="12" fill="rgba(196,62,20,0.25)"/>
  <ellipse cx="583" cy="222" rx="12" ry="8" fill="rgba(196,62,20,0.3)"/>
  <rect x="581" y="118" width="4" height="30" fill="rgba(196,62,20,0.5)"/>
  <circle cx="583" cy="115" r="3" fill="#e8521a" filter="url(#tglow)" opacity="0.8"/>

  <!-- City buildings -->
  <rect x="540" y="260" width="28" height="60" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.06)" stroke-width="0.5"/>
  <rect x="572" y="275" width="22" height="45" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.05)" stroke-width="0.5"/>
  <rect x="598" y="255" width="32" height="65" fill="rgba(255,255,255,0.055)" stroke="rgba(255,255,255,0.06)" stroke-width="0.5"/>
  <rect x="634" y="270" width="20" height="50" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.05)" stroke-width="0.5"/>
  <rect x="658" y="248" width="36" height="72" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.06)" stroke-width="0.5"/>
  <rect x="698" y="265" width="24" height="55" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.05)" stroke-width="0.5"/>
  <rect x="726" y="252" width="30" height="68" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.055)" stroke-width="0.5"/>
  <rect x="760" y="272" width="40" height="48" fill="rgba(255,255,255,0.04)"/>

  <!-- Building windows (tiny dots) -->
  <g fill="rgba(255,220,150,0.25)">
    <rect x="544" y="265" width="3" height="2"/>
    <rect x="550" y="265" width="3" height="2"/>
    <rect x="556" y="265" width="3" height="2"/>
    <rect x="544" y="272" width="3" height="2"/>
    <rect x="550" y="272" width="3" height="2"/>
    <rect x="602" y="260" width="3" height="2"/>
    <rect x="610" y="260" width="3" height="2"/>
    <rect x="618" y="260" width="3" height="2"/>
    <rect x="662" y="253" width="3" height="2"/>
    <rect x="670" y="253" width="3" height="2"/>
    <rect x="678" y="253" width="3" height="2"/>
    <rect x="662" y="263" width="3" height="2"/>
    <rect x="670" y="263" width="3" height="2"/>
    <rect x="730" y="257" width="3" height="2"/>
    <rect x="738" y="257" width="3" height="2"/>
    <rect x="746" y="257" width="3" height="2"/>
  </g>

  <!-- Lake Ontario horizon line -->
  <rect x="0" y="320" width="800" height="100" fill="rgba(20,50,60,0.3)"/>
  <line x1="0" y1="320" x2="800" y2="320" stroke="rgba(100,160,180,0.1)" stroke-width="1"/>

  <!-- Accent bar top -->
  <rect x="0" y="0" width="800" height="4" fill="url(#taccent)"/>

  <!-- Text content - left side -->
  <text x="72" y="148" font-family="Georgia, serif" font-size="11" font-weight="700" fill="rgba(196,62,20,0.9)" letter-spacing="3">TORONTO COFFEE GUIDE</text>
  <rect x="72" y="158" width="40" height="2" fill="url(#taccent)" opacity="0.8"/>
  <text x="72" y="200" font-family="Georgia, serif" font-size="38" font-weight="900" fill="white" letter-spacing="-1">The 15 Best</text>
  <text x="72" y="246" font-family="Georgia, serif" font-size="38" font-weight="900" fill="white" letter-spacing="-1">Coffee Shops</text>
  <text x="72" y="292" font-family="Georgia, serif" font-size="38" font-weight="900" fill="url(#taccent)" letter-spacing="-1">in Toronto</text>
  <text x="72" y="340" font-family="Georgia, serif" font-size="13" fill="rgba(255,255,255,0.45)" letter-spacing="0.5">15 cafés · 2026 edition · curated by EZPZ Coffee</text>

  <!-- EZPZ badge -->
  <rect x="72" y="362" width="120" height="28" rx="3" fill="rgba(196,62,20,0.15)" stroke="rgba(196,62,20,0.4)" stroke-width="1"/>
  <text x="132" y="381" font-family="Georgia, serif" font-size="10.5" font-weight="700" fill="rgba(196,62,20,0.9)" text-anchor="middle" letter-spacing="1">BY EZPZ COFFEE</text>

  <!-- Corner decorative element -->
  <rect x="756" y="0" width="44" height="420" fill="rgba(196,62,20,0.03)"/>
  <line x1="756" y1="0" x2="756" y2="420" stroke="rgba(196,62,20,0.1)" stroke-width="1"/>
</svg>
