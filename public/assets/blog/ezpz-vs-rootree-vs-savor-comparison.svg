  <text x="365" y="66" font-family="Arial, sans-serif" font-size="7" fill="rgba(255,255,255,0.8)" text-anchor="middle" letter-spacing="1">FULL SERVICE</text>

  <!-- Rootree column -->
  <text x="530" y="52" font-family="Arial, sans-serif" font-size="9" font-weight="700" fill="rgba(255,255,255,0.5)" text-anchor="middle" letter-spacing="2">ROOTREE</text>
  <text x="530" y="66" font-family="Arial, sans-serif" font-size="7" fill="rgba(255,255,255,0.3)" text-anchor="middle" letter-spacing="1">PACKAGING ONLY</text>

  <!-- Savor column -->
  <text x="685" y="52" font-family="Arial, sans-serif" font-size="9" font-weight="700" fill="rgba(255,255,255,0.5)" text-anchor="middle" letter-spacing="2">SAVOR BRANDS</text>
  <text x="685" y="66" font-family="Arial, sans-serif" font-size="7" fill="rgba(255,255,255,0.3)" text-anchor="middle" letter-spacing="1">PACKAGING ONLY</text>

