  <text x="530" y="225" font-family="Arial, sans-serif" font-size="9" fill="rgba(255,255,255,0.3)" text-anchor="middle">5–7 weeks</text>
  <text x="685" y="225" font-family="Arial, sans-serif" font-size="9" fill="rgba(255,255,255,0.3)" text-anchor="middle">4–7 weeks</text>
