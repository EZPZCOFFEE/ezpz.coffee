  <text x="530" y="165" font-family="Arial, sans-serif" font-size="9" fill="rgba(255,255,255,0.3)" text-anchor="middle">✗ Arrange your own</text>
  <text x="685" y="165" font-family="Arial, sans-serif" font-size="9" fill="rgba(255,255,255,0.3)" text-anchor="middle">✗ Arrange your own</text>
