  <text x="365" y="309" font-family="Arial, sans-serif" font-size="8" font-weight="600" fill="#ff7744" text-anchor="middle">Any brand wanting</text>
  <text x="365" y="321" font-family="Arial, sans-serif" font-size="8" font-weight="600" fill="#ff7744" text-anchor="middle">to sell coffee</text>
  <text x="530" y="309" font-family="Arial, sans-serif" font-size="7.5" fill="rgba(255,255,255,0.3)" text-anchor="middle">Established roasters</text>
  <text x="530" y="321" font-family="Arial, sans-serif" font-size="7.5" fill="rgba(255,255,255,0.3)" text-anchor="middle">needing packaging</text>
  <text x="685" y="309" font-family="Arial, sans-serif" font-size="7.5" fill="rgba(255,255,255,0.3)" text-anchor="middle">Established roasters</text>
  <text x="685" y="321" font-family="Arial, sans-serif" font-size="7.5" fill="rgba(255,255,255,0.3)" text-anchor="middle">needing packaging</text>

