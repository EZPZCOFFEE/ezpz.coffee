  <text x="365" y="195" font-family="Arial, sans-serif" font-size="10" font-weight="800" fill="#ff4200" text-anchor="middle">✓ ZERO</text>
  <text x="530" y="195" font-family="Arial, sans-serif" font-size="9" fill="rgba(255,255,255,0.3)" text-anchor="middle">✗ 500+ units</text>
  <text x="685" y="195" font-family="Arial, sans-serif" font-size="9" fill="rgba(255,255,255,0.3)" text-anchor="middle">✗ 500+ units</text>
