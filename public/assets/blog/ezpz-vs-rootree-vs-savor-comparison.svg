  <rect x="460" y="80" width="145" height="290" rx="2" fill="url(#grayPanel)"/>

  <!-- Savor column bg -->
  <rect x="615" y="80" width="145" height="290" rx="2" fill="url(#grayPanel)"/>

  <!-- Rows -->
  <!-- Row data: [y, label, ezpz, ezpzColor, rootree, savor] -->

  <!-- Row 1: Coffee included -->
  <text x="55" y="105" font-family="Arial, sans-serif" font-size="8" font-weight="600" fill="rgba(255,255,255,0.7)">Coffee included</text>
  <text x="365" y="105" font-family="Arial, sans-serif" font-size="9" font-weight="700" fill="#ff7744" text-anchor="middle">✓ Specialty 80+ SCA</text>
  <text x="530" y="105" font-family="Arial, sans-serif" font-size="9" fill="rgba(255,255,255,0.3)" text-anchor="middle">✗ Source your own</text>
