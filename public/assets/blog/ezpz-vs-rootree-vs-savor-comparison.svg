  <line x1="0" y1="280" x2="800" y2="280" stroke="rgba(255,255,255,0.02)" stroke-width="1"/>

  <!-- Header row -->
  <rect x="40" y="48" width="720" height="32" rx="3" fill="rgba(255,255,255,0.03)"/>

