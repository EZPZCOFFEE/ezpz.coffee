  <text x="530" y="135" font-family="Arial, sans-serif" font-size="9" fill="rgba(255,255,255,0.3)" text-anchor="middle">✗ Extra cost</text>
  <text x="685" y="135" font-family="Arial, sans-serif" font-size="9" fill="rgba(255,255,255,0.3)" text-anchor="middle">✗ Extra cost</text>
