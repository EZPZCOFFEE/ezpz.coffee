<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" width="800" height="420">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0D0A07"/>
      <stop offset="100%" style="stop-color:#1a1208"/>
    </linearGradient>
    <linearGradient id="bagGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2a1f12"/>
      <stop offset="100%" style="stop-color:#1a1208"/>
    </linearGradient>
    <linearGradient id="mugGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2a2a2a"/>
      <stop offset="100%" style="stop-color:#1a1a1a"/>
    </linearGradient>
  </defs>

  <rect width="800" height="420" fill="url(#bg)"/>

  <!-- Grid -->
  <line x1="0" y1="140" x2="800" y2="140" stroke="rgba(255,255,255,0.025)" stroke-width="1"/>
  <line x1="0" y1="280" x2="800" y2="280" stroke="rgba(255,255,255,0.025)" stroke-width="1"/>
  <line x1="400" y1="0" x2="400" y2="420" stroke="rgba(255,255,255,0.025)" stroke-width="1"/>

  <!-- Divider line -->
  <line x1="400" y1="60" x2="400" y2="360" stroke="rgba(255,255,255,0.08)" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- VS badge -->
  <circle cx="400" cy="210" r="22" fill="#0D0A07" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
  <text x="400" y="215" font-family="Arial, sans-serif" font-size="11" font-weight="800" fill="rgba(255,255,255,0.7)" text-anchor="middle" letter-spacing="1">VS</text>

  <!-- LEFT: EZPZ Coffee Bag (winner) -->
  <!-- Radial glow -->
  <radialGradient id="bagGlow" cx="30%" cy="50%" r="40%">
    <stop offset="0%" style="stop-color:rgba(255,66,0,0.18)"/>
    <stop offset="100%" style="stop-color:rgba(255,66,0,0)"/>
  </radialGradient>
  <ellipse cx="200" cy="210" rx="160" ry="130" fill="url(#bagGlow)"/>

  <!-- Coffee bag -->
  <rect x="130" y="80" width="110" height="170" rx="6" fill="url(#bagGrad)" stroke="rgba(255,255,255,0.12)" stroke-width="1.5"/>
  <!-- Top seal -->
  <rect x="137" y="80" width="96" height="20" rx="3" fill="rgba(0,0,0,0.35)"/>
  <!-- Accent stripe -->
  <rect x="146" y="100" width="78" height="3" fill="#ff4200" opacity="0.9"/>
  <!-- Label -->
  <rect x="146" y="106" width="78" height="98" rx="1" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <!-- Label text -->
  <text x="185" y="130" font-family="Arial, sans-serif" font-size="6" font-weight="700" fill="rgba(255,66,0,0.85)" text-anchor="middle" letter-spacing="2">YOUR BRAND</text>
  <text x="185" y="148" font-family="Arial, sans-serif" font-size="9" font-weight="700" fill="rgba(255,255,255,0.9)" text-anchor="middle" letter-spacing="1.5">COFFEE</text>
  <text x="185" y="162" font-family="Arial, sans-serif" font-size="9" font-weight="700" fill="rgba(255,255,255,0.9)" text-anchor="middle" letter-spacing="1.5">BAG</text>
  <line x1="158" y1="170" x2="212" y2="170" stroke="rgba(255,66,0,0.3)" stroke-width="0.75"/>
  <text x="185" y="186" font-family="Georgia, serif" font-size="6" fill="rgba(255,255,255,0.4)" text-anchor="middle" font-style="italic">Specialty Coffee</text>
  <text x="185" y="198" font-family="Arial, sans-serif" font-size="5" fill="rgba(255,255,255,0.28)" text-anchor="middle" letter-spacing="1.5">EZPZ · MONTREAL</text>
  <!-- Valve -->
  <circle cx="185" cy="212" r="4" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <!-- Bottom gusset -->
  <rect x="137" y="232" width="96" height="18" rx="3" fill="rgba(0,0,0,0.3)"/>

  <!-- Winner crown -->
  <path d="M170 68 L180 52 L185 62 L190 45 L195 62 L200 52 L210 68Z" fill="#ff4200" opacity="0.9"/>
  <rect x="170" y="66" width="40" height="6" rx="1" fill="#ff4200" opacity="0.9"/>

  <!-- Win stats below bag -->
  <text x="185" y="274" font-family="Arial, sans-serif" font-size="7" font-weight="700" fill="rgba(255,66,0,0.9)" text-anchor="middle" letter-spacing="1.5">✓ 20–30 IMPRESSIONS/BAG</text>
  <text x="185" y="288" font-family="Arial, sans-serif" font-size="7" font-weight="700" fill="rgba(255,66,0,0.9)" text-anchor="middle" letter-spacing="1.5">✓ ZERO MINIMUM ORDER</text>
  <text x="185" y="302" font-family="Arial, sans-serif" font-size="7" font-weight="700" fill="rgba(255,66,0,0.9)" text-anchor="middle" letter-spacing="1.5">✓ DESIGN INCLUDED FREE</text>

  <!-- LEFT label -->
  <rect x="130" y="322" width="110" height="22" rx="2" fill="#ff4200"/>
  <text x="185" y="337" font-family="Arial, sans-serif" font-size="8" font-weight="800" fill="#fff" text-anchor="middle" letter-spacing="1.5">EZPZ COFFEE BAGS</text>

  <!-- RIGHT: Generic Mug (loser) -->
  <!-- Mug body -->
  <rect x="520" y="110" width="90" height="110" rx="8" fill="url(#mugGrad)" stroke="rgba(255,255,255,0.08)" stroke-width="1.5"/>
  <!-- Mug handle -->
  <path d="M610 130 Q640 130 640 155 Q640 180 610 180" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="8" stroke-linecap="round"/>
  <!-- Logo placeholder on mug -->
  <rect x="538" y="138" width="54" height="46" rx="2" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  <text x="565" y="156" font-family="Arial, sans-serif" font-size="7" fill="rgba(255,255,255,0.25)" text-anchor="middle" letter-spacing="1">YOUR</text>
  <text x="565" y="168" font-family="Arial, sans-serif" font-size="7" fill="rgba(255,255,255,0.25)" text-anchor="middle" letter-spacing="1">LOGO</text>
  <text x="565" y="180" font-family="Arial, sans-serif" font-size="6" fill="rgba(255,255,255,0.18)" text-anchor="middle">HERE</text>
  <!-- Mug rim -->
  <rect x="520" y="110" width="90" height="10" rx="4" fill="rgba(255,255,255,0.06)"/>
  <!-- Coffee surface -->
  <ellipse cx="565" cy="120" rx="40" ry="5" fill="rgba(101,67,33,0.35)"/>

  <!-- Cabinet shelf above mug -->
  <rect x="480" y="60" width="170" height="8" rx="2" fill="rgba(255,255,255,0.06)"/>
  <text x="565" y="57" font-family="Arial, sans-serif" font-size="7" fill="rgba(255,255,255,0.2)" text-anchor="middle" letter-spacing="1.5">KITCHEN CABINET</text>
  <!-- Dust particles -->
  <circle cx="498" cy="90" r="1.5" fill="rgba(255,255,255,0.08)"/>
  <circle cx="630" cy="85" r="1" fill="rgba(255,255,255,0.08)"/>
  <circle cx="615" cy="95" r="1.5" fill="rgba(255,255,255,0.06)"/>

  <!-- Loss stats -->
  <text x="565" y="254" font-family="Arial, sans-serif" font-size="7" fill="rgba(255,255,255,0.3)" text-anchor="middle" letter-spacing="1.5">✗ 1–2 IMPRESSIONS MAX</text>
  <text x="565" y="268" font-family="Arial, sans-serif" font-size="7" fill="rgba(255,255,255,0.3)" text-anchor="middle" letter-spacing="1.5">✗ ENDS UP IN CABINET</text>
  <text x="565" y="282" font-family="Arial, sans-serif" font-size="7" fill="rgba(255,255,255,0.3)" text-anchor="middle" letter-spacing="1.5">✗ FORGOTTEN IN WEEKS</text>

  <!-- Right label -->
  <rect x="510" y="322" width="110" height="22" rx="2" fill="rgba(255,255,255,0.07)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <text x="565" y="337" font-family="Arial, sans-serif" font-size="8" font-weight="700" fill="rgba(255,255,255,0.4)" text-anchor="middle" letter-spacing="1.5">CUSTOM MUGS</text>

  <!-- Footer -->
  <text x="400" y="398" font-family="Arial, sans-serif" font-size="8" fill="rgba(255,255,255,0.15)" text-anchor="middle" letter-spacing="3">BUSINESS TIPS · CUSTOM BAGS VS MUGS · CANADA</text>
</svg>
