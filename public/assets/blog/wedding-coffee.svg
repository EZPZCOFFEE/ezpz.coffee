<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" width="800" height="420">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a0e1a"/>
      <stop offset="100%" style="stop-color:#2d1a2d"/>
    </linearGradient>
    <linearGradient id="bagGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#3a2a3a"/>
      <stop offset="100%" style="stop-color:#2d1a2d"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#c43e14"/>
      <stop offset="100%" style="stop-color:#e8521a"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="420" fill="url(#bg)"/>

  <!-- Subtle grid lines -->
  <line x1="0" y1="140" x2="800" y2="140" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="0" y1="280" x2="800" y2="280" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="200" y1="0" x2="200" y2="420" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="400" y1="0" x2="400" y2="420" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="600" y1="0" x2="600" y2="420" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>

  <!-- Coffee bag body -->
  <rect x="280" y="60" width="150" height="230" rx="7" fill="url(#bagGrad)" stroke="rgba(255,255,255,0.12)" stroke-width="1.5"/>
  <!-- Top seal -->
  <rect x="288" y="60" width="134" height="26" rx="4" fill="rgba(0,0,0,0.25)"/>
  <line x1="288" y1="73" x2="422" y2="73" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <rect x="346" y="60" width="5" height="14" rx="1" fill="rgba(255,255,255,0.1)"/>
  <rect x="359" y="60" width="5" height="14" rx="1" fill="rgba(255,255,255,0.1)"/>
  <!-- Bottom gusset -->
  <rect x="288" y="265" width="134" height="25" rx="4" fill="rgba(0,0,0,0.2)"/>
  <!-- Side seams -->
  <rect x="280" y="86" width="10" height="179" fill="rgba(0,0,0,0.2)"/>
  <rect x="420" y="86" width="10" height="179" fill="rgba(0,0,0,0.2)"/>

  <!-- Label panel on bag -->
  <rect x="298" y="102" width="114" height="140" rx="3" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
  <text x="355" y="134" font-family="Georgia, serif" font-size="9" fill="rgba(255,255,255,0.5)" text-anchor="middle" font-style="italic">Emma &amp; James</text>
  <line x1="315" y1="142" x2="395" y2="142" stroke="rgba(255,255,255,0.15)" stroke-width="0.75"/>
  <text x="355" y="160" font-family="Arial, sans-serif" font-size="10" font-weight="700" fill="rgba(255,255,255,0.85)" text-anchor="middle" letter-spacing="2">JUNE 14</text>
  <text x="355" y="176" font-family="Arial, sans-serif" font-size="10" font-weight="700" fill="rgba(255,255,255,0.85)" text-anchor="middle" letter-spacing="2">2026</text>
  <line x1="318" y1="184" x2="392" y2="184" stroke="rgba(255,255,255,0.2)" stroke-width="0.75"/>
  <text x="355" y="202" font-family="Georgia, serif" font-size="8.5" fill="rgba(255,255,255,0.45)" text-anchor="middle" font-style="italic">Specialty Coffee</text>
  <text x="355" y="218" font-family="Arial, sans-serif" font-size="7" fill="rgba(255,255,255,0.3)" text-anchor="middle" letter-spacing="1.5">CANADA</text>
  <!-- Valve -->
  <circle cx="355" cy="237" r="5.5" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
  <circle cx="355" cy="237" r="2" fill="rgba(255,255,255,0.1)"/>

  <!-- Left side: wedding rings illustration -->
  <!-- Ring 1 -->
  <circle cx="142" cy="200" r="32" fill="none" stroke="rgba(255,255,255,0.25)" stroke-width="3"/>
  <circle cx="142" cy="200" r="32" fill="none" stroke="rgba(232,82,26,0.3)" stroke-width="1" stroke-dasharray="4 3"/>
  <!-- Ring 2 -->
  <circle cx="172" cy="200" r="32" fill="none" stroke="rgba(255,255,255,0.25)" stroke-width="3"/>
  <circle cx="172" cy="200" r="32" fill="none" stroke="rgba(232,82,26,0.3)" stroke-width="1" stroke-dasharray="4 3"/>
  <!-- Diamond on ring 1 -->
  <polygon points="142,152 148,162 142,170 136,162" fill="rgba(255,255,255,0.15)" stroke="rgba(255,255,255,0.4)" stroke-width="1"/>
  <line x1="136" y1="162" x2="148" y2="162" stroke="rgba(255,255,255,0.2)" stroke-width="0.75"/>
  <line x1="142" y1="152" x2="142" y2="170" stroke="rgba(255,255,255,0.2)" stroke-width="0.75"/>
  <!-- Floral accents -->
  <circle cx="110" cy="240" r="5" fill="none" stroke="rgba(232,82,26,0.4)" stroke-width="1"/>
  <circle cx="110" cy="240" r="2" fill="rgba(232,82,26,0.3)"/>
  <circle cx="205" cy="155" r="5" fill="none" stroke="rgba(232,82,26,0.4)" stroke-width="1"/>
  <circle cx="205" cy="155" r="2" fill="rgba(232,82,26,0.3)"/>
  <!-- Leaf accents -->
  <ellipse cx="100" cy="175" rx="8" ry="4" fill="rgba(255,255,255,0.08)" transform="rotate(-30, 100, 175)"/>
  <ellipse cx="215" cy="230" rx="8" ry="4" fill="rgba(255,255,255,0.08)" transform="rotate(40, 215, 230)"/>

  <!-- Right side: favor tags / table setting panel -->
  <rect x="470" y="130" width="190" height="160" rx="4" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <!-- Panel header -->
  <rect x="470" y="130" width="190" height="28" rx="4" fill="rgba(232,82,26,0.15)"/>
  <rect x="470" y="146" width="190" height="12" fill="rgba(232,82,26,0.15)"/>
  <text x="565" y="149" font-family="Arial, sans-serif" font-size="7.5" font-weight="700" fill="#e8521a" text-anchor="middle" letter-spacing="2">WEDDING FAVORS</text>

  <!-- Favor tag shapes -->
  <!-- Tag 1 -->
  <rect x="484" y="170" width="50" height="70" rx="3" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
  <circle cx="509" cy="175" r="3" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
  <line x1="498" y1="188" x2="520" y2="188" stroke="rgba(255,255,255,0.12)" stroke-width="1"/>
  <line x1="498" y1="196" x2="520" y2="196" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <line x1="498" y1="204" x2="514" y2="204" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <!-- Tag 2 -->
  <rect x="545" y="165" width="50" height="75" rx="3" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
  <circle cx="570" cy="170" r="3" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
  <line x1="558" y1="183" x2="582" y2="183" stroke="rgba(255,255,255,0.12)" stroke-width="1"/>
  <line x1="558" y1="191" x2="582" y2="191" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <line x1="558" y1="199" x2="574" y2="199" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <!-- Tag 3 -->
  <rect x="606" y="170" width="44" height="68" rx="3" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
  <circle cx="628" cy="175" r="3" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
  <line x1="617" y1="188" x2="639" y2="188" stroke="rgba(255,255,255,0.12)" stroke-width="1"/>
  <line x1="617" y1="196" x2="639" y2="196" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>

  <!-- Guest count label -->
  <line x1="484" y1="255" x2="650" y2="255" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  <text x="484" y="271" font-family="Arial, sans-serif" font-size="7" fill="rgba(255,255,255,0.35)" letter-spacing="1">NO MINIMUM ORDER</text>
  <text x="484" y="283" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="rgba(232,82,26,0.7)">∞</text>

  <!-- Footer label -->
  <text x="400" y="398" font-family="Arial, sans-serif" font-size="8.5" fill="rgba(255,255,255,0.2)" text-anchor="middle" letter-spacing="3">WEDDING FAVORS · CUSTOM BRANDED COFFEE · CANADA</text>
</svg>
