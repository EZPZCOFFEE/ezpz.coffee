<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" width="800" height="420">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#060d1a"/>
      <stop offset="100%" style="stop-color:#0f1e30"/>
    </linearGradient>
    <linearGradient id="bagGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1a2840"/>
      <stop offset="100%" style="stop-color:#0d1a2d"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#c43e14"/>
      <stop offset="100%" style="stop-color:#e8521a"/>
    </linearGradient>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#d4a842"/>
      <stop offset="100%" style="stop-color:#b8922e"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="420" fill="url(#bg)"/>

  <!-- Subtle grid -->
  <line x1="0" y1="140" x2="800" y2="140" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="0" y1="280" x2="800" y2="280" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="200" y1="0" x2="200" y2="420" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="400" y1="0" x2="400" y2="420" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="600" y1="0" x2="600" y2="420" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>

  <!-- ── Coffee bag (center) ─────────────────────────────── -->
  <rect x="288" y="58" width="154" height="238" rx="7" fill="url(#bagGrad)" stroke="rgba(255,255,255,0.12)" stroke-width="1.5"/>
  <!-- Top seal -->
  <rect x="296" y="58" width="138" height="26" rx="4" fill="rgba(0,0,0,0.3)"/>
  <line x1="296" y1="71" x2="434" y2="71" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <rect x="350" y="58" width="5" height="14" rx="1" fill="rgba(255,255,255,0.08)"/>
  <rect x="375" y="58" width="5" height="14" rx="1" fill="rgba(255,255,255,0.08)"/>
  <!-- Bottom gusset -->
  <rect x="296" y="271" width="138" height="25" rx="4" fill="rgba(0,0,0,0.25)"/>
  <!-- Side seams -->
  <rect x="288" y="84" width="10" height="187" fill="rgba(0,0,0,0.2)"/>
  <rect x="432" y="84" width="10" height="187" fill="rgba(0,0,0,0.2)"/>

  <!-- Label panel -->
  <rect x="306" y="100" width="118" height="148" rx="2" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.14)" stroke-width="1"/>

  <!-- Fleur-de-lis accent (stylized) -->
  <text x="365" y="126" font-family="Georgia, serif" font-size="16" fill="rgba(212,168,66,0.45)" text-anchor="middle">✦</text>

  <!-- Label text -->
  <text x="365" y="150" font-family="Arial, sans-serif" font-size="7.5" font-weight="700" fill="rgba(212,168,66,0.75)" text-anchor="middle" letter-spacing="3">MONTRÉAL</text>
  <text x="365" y="168" font-family="Arial, sans-serif" font-size="11" font-weight="700" fill="rgba(255,255,255,0.88)" text-anchor="middle" letter-spacing="2.5">SPECIALTY</text>
  <text x="365" y="184" font-family="Arial, sans-serif" font-size="11" font-weight="700" fill="rgba(255,255,255,0.88)" text-anchor="middle" letter-spacing="2.5">COFFEE</text>
  <line x1="326" y1="194" x2="404" y2="194" stroke="rgba(212,168,66,0.28)" stroke-width="0.75"/>
  <text x="365" y="212" font-family="Georgia, serif" font-size="8" fill="rgba(255,255,255,0.42)" text-anchor="middle" font-style="italic">Roasted in Montréal</text>
  <text x="365" y="230" font-family="Arial, sans-serif" font-size="6.5" fill="rgba(255,255,255,0.28)" text-anchor="middle" letter-spacing="1.5">EZPZ · CANADA</text>
  <!-- Valve -->
  <circle cx="365" cy="244" r="5" fill="none" stroke="rgba(255,255,255,0.12)" stroke-width="1"/>
  <circle cx="365" cy="244" r="2" fill="rgba(255,255,255,0.08)"/>

  <!-- Orange accent stripe -->
  <rect x="288" y="160" width="154" height="3" fill="url(#accentGrad)" opacity="0.7"/>

  <!-- ── Left: Café storefront ───────────────────────────── -->
  <!-- Building -->
  <rect x="80" y="160" width="148" height="120" rx="3" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.1)" stroke-width="1.5"/>
  <!-- Awning -->
  <path d="M72 160 L156 128 L240 160Z" fill="url(#accentGrad)" opacity="0.75"/>
  <!-- Awning stripes -->
  <line x1="104" y1="160" x2="118" y2="140" stroke="rgba(0,0,0,0.18)" stroke-width="5"/>
  <line x1="128" y1="160" x2="140" y2="133" stroke="rgba(0,0,0,0.18)" stroke-width="5"/>
  <line x1="152" y1="160" x2="162" y2="129" stroke="rgba(0,0,0,0.18)" stroke-width="5"/>
  <line x1="176" y1="160" x2="183" y2="132" stroke="rgba(0,0,0,0.18)" stroke-width="5"/>
  <line x1="200" y1="160" x2="205" y2="138" stroke="rgba(0,0,0,0.18)" stroke-width="5"/>
  <!-- Awning bottom edge -->
  <line x1="72" y1="160" x2="240" y2="160" stroke="rgba(0,0,0,0.3)" stroke-width="2"/>
  <!-- Window left -->
  <rect x="92" y="178" width="48" height="56" rx="2" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.14)" stroke-width="1"/>
  <!-- Window cross -->
  <line x1="116" y1="178" x2="116" y2="234" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <line x1="92" y1="206" x2="140" y2="206" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <!-- Coffee cup in window -->
  <rect x="103" y="187" width="16" height="12" rx="2" fill="rgba(255,255,255,0.1)" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
  <path d="M119 191 Q124 191 124 196 Q124 201 119 201" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
  <rect x="101" y="198" width="20" height="3" rx="1" fill="rgba(255,255,255,0.1)"/>
  <!-- Steam above cup -->
  <path d="M109 185 Q111 180 109 175" fill="none" stroke="rgba(255,255,255,0.14)" stroke-width="1" stroke-linecap="round"/>
  <path d="M113 185 Q115 179 113 173" fill="none" stroke="rgba(255,255,255,0.14)" stroke-width="1" stroke-linecap="round"/>
  <!-- Window right -->
  <rect x="168" y="178" width="48" height="56" rx="2" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.14)" stroke-width="1"/>
  <line x1="192" y1="178" x2="192" y2="234" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <line x1="168" y1="206" x2="216" y2="206" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <!-- Door -->
  <rect x="134" y="215" width="40" height="65" rx="2" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <circle cx="170" cy="248" r="2.5" fill="rgba(255,255,255,0.2)"/>
  <!-- Café sign -->
  <rect x="104" y="144" width="100" height="18" rx="2" fill="rgba(212,168,66,0.15)" stroke="rgba(212,168,66,0.3)" stroke-width="1"/>
  <text x="154" y="157" font-family="Georgia, serif" font-size="9" fill="rgba(212,168,66,0.75)" text-anchor="middle" font-style="italic" letter-spacing="1.5">café</text>
  <!-- Stars below building -->
  <text x="154" y="310" font-family="Arial, sans-serif" font-size="11" fill="rgba(212,168,66,0.5)" text-anchor="middle" letter-spacing="3">★★★★★</text>
  <text x="154" y="328" font-family="Arial, sans-serif" font-size="6.5" fill="rgba(255,255,255,0.22)" text-anchor="middle" letter-spacing="1.5">SPECIALTY CAFÉS</text>

  <!-- ── Right: World rankings panel ────────────────────── -->
  <rect x="478" y="128" width="188" height="182" rx="4" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <!-- Header -->
  <rect x="478" y="128" width="188" height="30" rx="4" fill="rgba(212,168,66,0.12)"/>
  <rect x="478" y="146" width="188" height="12" fill="rgba(212,168,66,0.12)"/>
  <!-- Medal icon -->
  <circle cx="498" cy="143" r="8" fill="url(#goldGrad)" opacity="0.85"/>
  <text x="498" y="148" font-family="Arial, sans-serif" font-size="8" font-weight="700" fill="#0d1a2d" text-anchor="middle">★</text>
  <text x="548" y="148" font-family="Arial, sans-serif" font-size="7.5" font-weight="700" fill="rgba(212,168,66,0.85)" text-anchor="middle" letter-spacing="2">WORLD RANKED</text>
  <text x="630" y="143" font-family="Arial, sans-serif" font-size="6.5" fill="rgba(255,255,255,0.3)" text-anchor="middle" letter-spacing="1">2026</text>

  <!-- Row 1 -->
  <line x1="492" y1="178" x2="652" y2="178" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  <text x="492" y="172" font-family="Arial, sans-serif" font-size="7" fill="rgba(212,168,66,0.65)" font-weight="700">#34</text>
  <text x="518" y="172" font-family="Arial, sans-serif" font-size="7.5" fill="rgba(255,255,255,0.6)">Café Pista</text>
  <text x="648" y="172" font-family="Arial, sans-serif" font-size="6.5" fill="rgba(255,255,255,0.25)" text-anchor="end" letter-spacing="0.5">Rosemont</text>

  <!-- Row 2 -->
  <line x1="492" y1="205" x2="652" y2="205" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  <text x="492" y="199" font-family="Arial, sans-serif" font-size="7" fill="rgba(212,168,66,0.55)" font-weight="700">#60</text>
  <text x="518" y="199" font-family="Arial, sans-serif" font-size="7.5" fill="rgba(255,255,255,0.6)">Café Saint-Henri</text>
  <text x="648" y="199" font-family="Arial, sans-serif" font-size="6.5" fill="rgba(255,255,255,0.25)" text-anchor="end" letter-spacing="0.5">Saint-Henri</text>

  <!-- Row 3 -->
  <line x1="492" y1="232" x2="652" y2="232" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  <text x="492" y="226" font-family="Arial, sans-serif" font-size="7" fill="rgba(212,168,66,0.45)" font-weight="700">#89</text>
  <text x="518" y="226" font-family="Arial, sans-serif" font-size="7.5" fill="rgba(255,255,255,0.6)">Micro Espresso Bar</text>
  <text x="648" y="226" font-family="Arial, sans-serif" font-size="6.5" fill="rgba(255,255,255,0.25)" text-anchor="end" letter-spacing="0.5">Milton-Parc</text>

  <!-- Row 4 -->
  <line x1="492" y1="259" x2="652" y2="259" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  <text x="492" y="253" font-family="Arial, sans-serif" font-size="7" fill="rgba(212,168,66,0.38)" font-weight="700">#91</text>
  <text x="518" y="253" font-family="Arial, sans-serif" font-size="7.5" fill="rgba(255,255,255,0.6)">Café Éclair</text>
  <text x="648" y="253" font-family="Arial, sans-serif" font-size="6.5" fill="rgba(255,255,255,0.25)" text-anchor="end" letter-spacing="0.5">Mile End</text>

  <!-- Footer note -->
  <text x="572" y="292" font-family="Arial, sans-serif" font-size="6.5" fill="rgba(255,255,255,0.2)" text-anchor="middle" letter-spacing="0.8">Top 100 · North America · 4,600+ evaluated</text>

  <!-- ── Page footer label ───────────────────────────────── -->
  <text x="400" y="400" font-family="Arial, sans-serif" font-size="8.5" fill="rgba(255,255,255,0.18)" text-anchor="middle" letter-spacing="3">MONTREAL COFFEE GUIDE · 15 BEST COFFEE SHOPS · 2026</text>
</svg>
