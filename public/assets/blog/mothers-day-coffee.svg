<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" width="800" height="420">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a0808"/>
      <stop offset="100%" style="stop-color:#2d1010"/>
    </linearGradient>
    <linearGradient id="bagGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#3d1a1a"/>
      <stop offset="100%" style="stop-color:#2a0d0d"/>
    </linearGradient>
  </defs>

  <rect width="800" height="420" fill="url(#bg)"/>

  <!-- Subtle grid -->
  <line x1="0" y1="140" x2="800" y2="140" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="0" y1="280" x2="800" y2="280" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="200" y1="0" x2="200" y2="420" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="400" y1="0" x2="400" y2="420" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="600" y1="0" x2="600" y2="420" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>

  <!-- Coffee bag -->
  <rect x="290" y="55" width="160" height="240" rx="7" fill="url(#bagGrad)" stroke="rgba(255,255,255,0.1)" stroke-width="1.5"/>
  <!-- Top seal -->
  <rect x="298" y="55" width="144" height="26" rx="4" fill="rgba(0,0,0,0.3)"/>
  <line x1="298" y1="68" x2="442" y2="68" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <rect x="353" y="55" width="5" height="14" rx="1" fill="rgba(255,255,255,0.08)"/>
  <rect x="382" y="55" width="5" height="14" rx="1" fill="rgba(255,255,255,0.08)"/>
  <!-- Bottom gusset -->
  <rect x="298" y="270" width="144" height="25" rx="4" fill="rgba(0,0,0,0.25)"/>
  <!-- Side seams -->
  <rect x="290" y="81" width="10" height="189" fill="rgba(0,0,0,0.2)"/>
  <rect x="440" y="81" width="10" height="189" fill="rgba(0,0,0,0.2)"/>

  <!-- Label panel -->
  <rect x="308" y="98" width="124" height="154" rx="2" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.12)" stroke-width="1"/>

  <!-- Floral wreath around label -->
  <!-- Small flowers scattered around label edge -->
  <circle cx="308" cy="128" r="4" fill="rgba(244,160,176,0.4)"/>
  <circle cx="308" cy="148" r="3" fill="rgba(244,160,176,0.3)"/>
  <circle cx="308" cy="168" r="4" fill="rgba(244,160,176,0.4)"/>
  <circle cx="432" cy="128" r="4" fill="rgba(244,160,176,0.4)"/>
  <circle cx="432" cy="148" r="3" fill="rgba(244,160,176,0.3)"/>
  <circle cx="432" cy="168" r="4" fill="rgba(244,160,176,0.4)"/>
  <!-- Stems -->
  <path d="M312 175 Q318 160 316 140" stroke="rgba(144,180,100,0.35)" stroke-width="1" fill="none"/>
  <path d="M428 175 Q422 160 424 140" stroke="rgba(144,180,100,0.35)" stroke-width="1" fill="none"/>
  <!-- Tiny leaf pairs -->
  <path d="M315 155 Q308 150 310 144" stroke="rgba(144,180,100,0.3)" stroke-width="1" fill="rgba(144,180,100,0.15)"/>
  <path d="M425 155 Q432 150 430 144" stroke="rgba(144,180,100,0.3)" stroke-width="1" fill="rgba(144,180,100,0.15)"/>

  <!-- Label content -->
  <text x="370" y="138" font-family="Georgia, serif" font-size="10" fill="rgba(244,160,176,0.7)" text-anchor="middle" letter-spacing="2.5">FOR MOM</text>
  <text x="370" y="162" font-family="Arial, sans-serif" font-size="14" font-weight="700" fill="rgba(255,255,255,0.9)" text-anchor="middle" letter-spacing="3">YOUR</text>
  <text x="370" y="180" font-family="Arial, sans-serif" font-size="14" font-weight="700" fill="rgba(255,255,255,0.9)" text-anchor="middle" letter-spacing="3">NAME</text>
  <line x1="330" y1="190" x2="410" y2="190" stroke="rgba(244,160,176,0.3)" stroke-width="0.75"/>
  <text x="370" y="210" font-family="Georgia, serif" font-size="8" fill="rgba(255,255,255,0.45)" text-anchor="middle" font-style="italic">Specialty Coffee</text>
  <text x="370" y="228" font-family="Arial, sans-serif" font-size="6.5" fill="rgba(255,255,255,0.3)" text-anchor="middle" letter-spacing="2">EZPZ · CANADA</text>
  <!-- Valve -->
  <circle cx="370" cy="246" r="5" fill="none" stroke="rgba(255,255,255,0.12)" stroke-width="1"/>
  <circle cx="370" cy="246" r="2" fill="rgba(255,255,255,0.08)"/>

  <!-- Left side: heart with coffee ring -->
  <circle cx="155" cy="210" r="52" fill="none" stroke="rgba(244,160,176,0.12)" stroke-width="1"/>
  <circle cx="155" cy="210" r="40" fill="none" stroke="rgba(244,160,176,0.08)" stroke-width="1"/>
  <!-- Heart shape -->
  <path d="M155 232 Q120 210 120 190 Q120 168 140 168 Q148 168 155 178 Q162 168 170 168 Q190 168 190 190 Q190 210 155 232Z" fill="rgba(244,80,100,0.25)" stroke="rgba(244,80,100,0.5)" stroke-width="1.5"/>
  <!-- Coffee cup inside heart -->
  <rect x="145" y="194" width="20" height="16" rx="2" fill="rgba(255,255,255,0.12)" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
  <path d="M165 200 Q172 200 172 206 Q172 212 165 212" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
  <!-- Steam -->
  <path d="M150 192 Q152 186 150 180" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="1" stroke-linecap="round"/>
  <path d="M155 192 Q157 185 155 178" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="1" stroke-linecap="round"/>
  <path d="M160 192 Q162 186 160 180" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="1" stroke-linecap="round"/>

  <!-- Right side: tasting notes panel -->
  <rect x="490" y="140" width="172" height="150" rx="4" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <rect x="490" y="140" width="172" height="26" rx="4" fill="rgba(244,160,176,0.12)"/>
  <rect x="490" y="154" width="172" height="12" fill="rgba(244,160,176,0.12)"/>
  <text x="576" y="157" font-family="Arial, sans-serif" font-size="7" font-weight="700" fill="rgba(244,160,176,0.8)" text-anchor="middle" letter-spacing="2">TASTING NOTES</text>

  <!-- Note rows -->
  <text x="504" y="182" font-family="Arial, sans-serif" font-size="6.5" fill="rgba(255,255,255,0.35)" letter-spacing="1">ETHIOPIA LIGHT</text>
  <text x="504" y="194" font-family="Georgia, serif" font-size="8.5" fill="rgba(255,255,255,0.6)" font-style="italic">Blueberry, Jasmine, Lemon</text>

  <line x1="504" y1="202" x2="648" y2="202" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  <text x="504" y="216" font-family="Arial, sans-serif" font-size="6.5" fill="rgba(255,255,255,0.35)" letter-spacing="1">COLOMBIA MEDIUM</text>
  <text x="504" y="228" font-family="Georgia, serif" font-size="8.5" fill="rgba(255,255,255,0.6)" font-style="italic">Caramel, Red Apple, Hazelnut</text>

  <line x1="504" y1="236" x2="648" y2="236" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  <text x="504" y="250" font-family="Arial, sans-serif" font-size="6.5" fill="rgba(255,255,255,0.35)" letter-spacing="1">BRAZIL DARK</text>
  <text x="504" y="262" font-family="Georgia, serif" font-size="8.5" fill="rgba(255,255,255,0.6)" font-style="italic">Chocolate, Vanilla, Brown Sugar</text>

  <!-- Scattered flower petals top area -->
  <circle cx="120" cy="80" r="5" fill="rgba(244,160,176,0.2)"/>
  <circle cx="140" cy="65" r="3.5" fill="rgba(244,160,176,0.15)"/>
  <circle cx="620" cy="75" r="4.5" fill="rgba(244,160,176,0.2)"/>
  <circle cx="650" cy="90" r="3" fill="rgba(244,160,176,0.15)"/>
  <circle cx="680" cy="70" r="5" fill="rgba(244,160,176,0.18)"/>

  <!-- Mother's Day label -->
  <text x="400" y="398" font-family="Arial, sans-serif" font-size="8.5" fill="rgba(255,255,255,0.2)" text-anchor="middle" letter-spacing="3">MOTHER&apos;S DAY GIFT · CUSTOM COFFEE · CANADA</text>
</svg>
